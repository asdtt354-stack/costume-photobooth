<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>대취타 포토부스 🥁</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0612;
    --bg2: #150c24;
    --purple: #7c4dff;
    --magenta: #e040fb;
    --gold: #f5d078;
    --gold-deep: #c8860a;
    --ink: #ece6ff;
    --ink-dim: #a99ecb;
    --line: rgba(124,77,255,0.35);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(ellipse at 50% -10%, var(--bg2), var(--bg) 60%);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 60px;
  }
  header { text-align: center; margin-bottom: 22px; }
  h1 {
    font-family: 'Noto Serif KR', serif;
    font-weight: 900;
    font-size: clamp(22px, 5vw, 34px);
    letter-spacing: 6px;
    color: #fff;
    text-shadow: 0 0 18px var(--purple), 0 0 46px var(--magenta);
  }
  .sub {
    margin-top: 8px;
    font-size: 13px;
    color: var(--ink-dim);
    letter-spacing: 2px;
  }

  .stage-wrap {
    position: relative;
    width: min(88vw, 380px);
    aspect-ratio: 3 / 4;
    border-radius: 18px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 0 1px var(--line), 0 0 50px rgba(124,77,255,0.35), 0 20px 60px rgba(0,0,0,0.6);
  }
  #cam {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    background: #050208;
  }
  #cam.mirror { transform: scaleX(-1); }
  #maskCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  #guideOval {
    position: absolute;
    border: 2px dashed var(--gold);
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 14px rgba(245,208,120,0.6);
    display: none;
  }
  .stage-wrap.editing #guideOval { display: block; }

  .status {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 10px;
    text-align: center;
    padding: 24px;
    font-size: 13px;
    color: var(--ink-dim);
    background: rgba(5,2,8,0.6);
  }
  .status button {
    pointer-events: auto;
  }

  .panel {
    width: min(88vw, 380px);
    margin-top: 18px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 18px;
  }
  .panel h2 {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 12px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .row label { width: 66px; font-size: 12px; color: var(--ink-dim); flex-shrink: 0; }
  .row input[type=range] {
    flex: 1;
    accent-color: var(--purple);
  }
  .toggles {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .chip {
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(124,77,255,0.08);
    color: var(--ink);
    cursor: pointer;
  }
  .chip.active { background: var(--purple); border-color: var(--purple); color: #fff; }

  .upload-btn {
    display: inline-block;
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(245,208,120,0.08);
    color: var(--gold);
    cursor: pointer;
  }
  input[type=file] { display: none; }

  .actions {
    width: min(88vw, 380px);
    margin-top: 20px;
    display: flex;
    gap: 12px;
  }
  .btn {
    flex: 1;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-family: 'Noto Serif KR', serif;
    font-weight: 900;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    color: #1a0f2e;
    background: linear-gradient(135deg, var(--gold), var(--gold-deep));
    box-shadow: 0 8px 24px rgba(245,208,120,0.3);
  }
  .btn.secondary {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
    box-shadow: none;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .result {
    display: none;
    width: min(88vw, 380px);
    margin-top: 22px;
    text-align: center;
  }
  .result.show { display: block; }
  .result img {
    width: 100%;
    border-radius: 16px;
    box-shadow: 0 0 0 1px var(--line), 0 0 50px rgba(124,77,255,0.35);
  }
  .result .actions { margin-top: 14px; }

  footer {
    margin-top: 30px;
    font-size: 11px;
    color: rgba(169,158,203,0.5);
    text-align: center;
    max-width: 340px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<header>
  <h1>대취타 포토부스</h1>
  <div class="sub">얼굴을 맞추고, 촬영하세요</div>
</header>

<div class="stage-wrap" id="stageWrap">
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="maskCanvas"></canvas>
  <div id="guideOval"></div>
  <div class="status" id="statusOverlay">
    <div>카메라를 시작해주세요</div>
    <button class="btn" id="startCamBtn" style="width:auto;padding:12px 24px;font-size:14px;">🎥 카메라 시작</button>
  </div>
</div>

<div class="panel">
  <h2>얼굴 위치 맞추기</h2>
  <div class="row"><label>좌우</label><input type="range" id="ox" min="0" max="100" value="50"></div>
  <div class="row"><label>상하</label><input type="range" id="oy" min="0" max="100" value="34"></div>
  <div class="row"><label>너비</label><input type="range" id="ow" min="5" max="60" value="26"></div>
  <div class="row"><label>높이</label><input type="range" id="oh" min="5" max="60" value="22"></div>
  <div class="toggles">
    <div class="chip active" id="editToggle">📐 위치 조정 중</div>
    <div class="chip" id="mirrorToggle">🪞 좌우반전</div>
    <div class="chip" id="switchCamBtn">🔄 카메라 전환</div>
    <label class="upload-btn">
      🖼️ 그림 바꾸기
      <input type="file" id="fileInput" accept="image/*">
    </label>
    <div class="chip" id="rerollBtn">🎲 기본 그림 새로 받기</div>
  </div>
</div>

<div class="actions">
  <button class="btn" id="captureBtn" disabled>📸 촬영</button>
</div>

<div class="result" id="resultBox">
  <img id="resultImg" alt="촬영 결과">
  <div class="actions">
    <a class="btn" id="downloadBtn" download="daechwita-photo.jpg" style="text-decoration:none;text-align:center;">💾 저장</a>
    <button class="btn secondary" id="retakeBtn">다시 찍기</button>
  </div>
</div>

<footer>
  기본 그림은 AI로 생성된 이미지입니다. 슬라이더로 얼굴 구멍 위치를 먼저 맞춘 뒤 촬영하세요.
  카메라가 열리지 않으면, 이 페이지를 실제 브라우저 탭(배포된 주소)에서 열어 카메라 권한을 허용해주세요.
</footer>

<script>
const stageWrap = document.getElementById('stageWrap');
const video = document.getElementById('cam');
const maskCanvas = document.getElementById('maskCanvas');
const mctx = maskCanvas.getContext('2d');
const guideOval = document.getElementById('guideOval');
const statusOverlay = document.getElementById('statusOverlay');
const startCamBtn = document.getElementById('startCamBtn');
const captureBtn = document.getElementById('captureBtn');
const resultBox = document.getElementById('resultBox');
const resultImg = document.getElementById('resultImg');
const downloadBtn = document.getElementById('downloadBtn');
const retakeBtn = document.getElementById('retakeBtn');
const editToggle = document.getElementById('editToggle');
const mirrorToggle = document.getElementById('mirrorToggle');
const switchCamBtn = document.getElementById('switchCamBtn');
const fileInput = document.getElementById('fileInput');
const rerollBtn = document.getElementById('rerollBtn');

const oxEl = document.getElementById('ox');
const oyEl = document.getElementById('oy');
const owEl = document.getElementById('ow');
const ohEl = document.getElementById('oh');

let currentStream = null;
let facingMode = 'user';
let mirrored = true;
let editing = true;
let illustration = new Image();
illustration.crossOrigin = 'anonymous';

const DAECHWITA_PROMPT = "Korean Joseon dynasty daechwita royal military parade band, full ensemble of musicians in colorful traditional court costumes, one large drummer playing yonggo drum prominently in the front center facing viewer, painterly digital illustration, dramatic warm lighting, ornate hanbok details, vertical portrait composition, rich color, fantasy epic atmosphere";

function pollinationsUrl(seed) {
  const p = encodeURIComponent(DAECHWITA_PROMPT);
  return `https://image.pollinations.ai/prompt/${p}?width=900&height=1200&nologo=true&seed=${seed}`;
}

function loadIllustration(url) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { illustration = img; drawMask(); };
  img.onerror = () => { console.warn('이미지를 불러오지 못했습니다:', url); };
  img.src = url;
}

loadIllustration(pollinationsUrl(Math.floor(Math.random()*100000)));

rerollBtn.addEventListener('click', () => {
  loadIllustration(pollinationsUrl(Math.floor(Math.random()*100000)));
});

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => loadIllustration(ev.target.result);
  reader.readAsDataURL(file);
});

function resizeCanvas() {
  const rect = stageWrap.getBoundingClientRect();
  maskCanvas.width = rect.width;
  maskCanvas.height = rect.height;
  drawMask();
  updateGuideOval();
}
window.addEventListener('resize', resizeCanvas);

function getOvalParams() {
  return {
    cxPct: parseFloat(oxEl.value) / 100,
    cyPct: parseFloat(oyEl.value) / 100,
    rxPct: parseFloat(owEl.value) / 100 / 2,
    ryPct: parseFloat(ohEl.value) / 100 / 2,
  };
}

function drawMask() {
  const w = maskCanvas.width, h = maskCanvas.height;
  if (!w || !h) return;
  mctx.clearRect(0, 0, w, h);
  if (illustration.complete && illustration.naturalWidth) {
    drawCover(mctx, illustration, w, h);
  }
  const { cxPct, cyPct, rxPct, ryPct } = getOvalParams();
  mctx.globalCompositeOperation = 'destination-out';
  mctx.beginPath();
  mctx.ellipse(w*cxPct, h*cyPct, w*rxPct, h*ryPct, 0, 0, Math.PI*2);
  mctx.fill();
  mctx.globalCompositeOperation = 'source-over';
}

function drawCover(ctx, img, targetW, targetH) {
  const iw = img.naturalWidth || img.width, ih = img.naturalHeight || img.height;
  const scale = Math.max(targetW / iw, targetH / ih);
  const sw = targetW / scale, sh = targetH / scale;
  const sx = (iw - sw) / 2, sy = (ih - sh) / 2;
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetW, targetH);
}

function updateGuideOval() {
  const { cxPct, cyPct, rxPct, ryPct } = getOvalParams();
  const w = stageWrap.clientWidth, h = stageWrap.clientHeight;
  const left = (cxPct - rxPct) * w;
  const top = (cyPct - ryPct) * h;
  guideOval.style.left = left + 'px';
  guideOval.style.top = top + 'px';
  guideOval.style.width = (rxPct*2*w) + 'px';
  guideOval.style.height = (ryPct*2*h) + 'px';
}

[oxEl, oyEl, owEl, ohEl].forEach(el => el.addEventListener('input', () => {
  drawMask();
  updateGuideOval();
}));

editToggle.addEventListener('click', () => {
  editing = !editing;
  stageWrap.classList.toggle('editing', editing);
  editToggle.classList.toggle('active', editing);
  editToggle.textContent = editing ? '📐 위치 조정 중' : '📐 위치 조정 끄기';
});
stageWrap.classList.add('editing');

mirrorToggle.addEventListener('click', () => {
  mirrored = !mirrored;
  video.classList.toggle('mirror', mirrored);
  mirrorToggle.classList.toggle('active', mirrored);
});
video.classList.add('mirror');
mirrorToggle.classList.add('active');

async function startCamera() {
  try {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 900 }, height: { ideal: 1200 } },
      audio: false
    });
    currentStream = stream;
    video.srcObject = stream;
    statusOverlay.style.display = 'none';
    captureBtn.disabled = false;
    resizeCanvas();
  } catch (err) {
    statusOverlay.style.display = 'flex';
    statusOverlay.innerHTML = `<div>카메라를 열 수 없어요.<br>브라우저 권한을 허용했는지 확인해주세요.<br><span style="color:#e6a; font-size:11px;">(${err.message})</span></div>`;
  }
}
startCamBtn.addEventListener('click', startCamera);

switchCamBtn.addEventListener('click', () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  startCamera();
});

captureBtn.addEventListener('click', () => {
  const outW = 1080, outH = 1440;
  const finalCanvas = document.createElement('canvas');
  finalCanvas.width = outW; finalCanvas.height = outH;
  const fctx = finalCanvas.getContext('2d');

  // 1. draw current video frame (respecting mirror), cover-fit
  fctx.save();
  if (mirrored) {
    fctx.translate(outW, 0);
    fctx.scale(-1, 1);
  }
  drawCover(fctx, video, outW, outH);
  fctx.restore();

  // 2. draw illustration-with-hole on top
  const illustLayer = document.createElement('canvas');
  illustLayer.width = outW; illustLayer.height = outH;
  const lctx = illustLayer.getContext('2d');
  if (illustration.complete && illustration.naturalWidth) {
    drawCover(lctx, illustration, outW, outH);
  }
  const { cxPct, cyPct, rxPct, ryPct } = getOvalParams();
  lctx.globalCompositeOperation = 'destination-out';
  lctx.beginPath();
  lctx.ellipse(outW*cxPct, outH*cyPct, outW*rxPct, outH*ryPct, 0, 0, Math.PI*2);
  lctx.fill();

  fctx.drawImage(illustLayer, 0, 0);

  const dataUrl = finalCanvas.toDataURL('image/jpeg', 0.92);
  resultImg.src = dataUrl;
  downloadBtn.href = dataUrl;
  const ts = new Date().toISOString().replace(/[:.]/g,'-');
  downloadBtn.download = `daechwita-${ts}.jpg`;
  resultBox.classList.add('show');
  resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
});

retakeBtn.addEventListener('click', () => {
  resultBox.classList.remove('show');
});

// init guide once layout settles
requestAnimationFrame(() => { resizeCanvas(); });
</script>
</body>
</html>
