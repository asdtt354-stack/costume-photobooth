<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차원의 문 🌀</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }
  .title {
    font-family: 'Noto Serif KR', 'Georgia', serif;
    font-size: clamp(28px, 6vw, 72px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 8px;
    text-shadow:
      0 0 20px #7c4dff,
      0 0 40px #7c4dff,
      0 0 80px #e040fb;
    animation: pulse 2s ease-in-out infinite;
    text-align: center;
    padding: 0 20px;
  }
  .subtitle {
    font-family: 'Noto Serif KR', 'Georgia', serif;
    font-size: clamp(14px, 2.5vw, 28px);
    color: #c0a0ff;
    letter-spacing: 4px;
    margin-top: 16px;
    text-shadow: 0 0 20px #7c4dff;
    animation: pulse 2s ease-in-out infinite 0.5s;
    text-align: center;
  }
  .year {
    font-family: 'Courier New', monospace;
    font-size: clamp(36px, 8vw, 100px);
    font-weight: 900;
    color: #f5d078;
    letter-spacing: 6px;
    margin-top: 24px;
    text-shadow:
      0 0 20px #c8860a,
      0 0 60px #f5d078;
    animation: yearFlicker 3s ease-in-out infinite;
  }
  .bottom-text {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Noto Serif KR', 'Georgia', serif;
    font-size: clamp(12px, 2vw, 20px);
    color: rgba(200, 160, 255, 0.7);
    letter-spacing: 3px;
    text-align: center;
    animation: blink 2s ease-in-out infinite;
    white-space: nowrap;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.03); }
  }
  @keyframes yearFlicker {
    0%, 90%, 100% { opacity: 1; }
    92% { opacity: 0.3; }
    94% { opacity: 1; }
    96% { opacity: 0.5; }
    98% { opacity: 1; }
  }
  @keyframes blink {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="c"></canvas>

<div class="overlay">
  <div class="title">차 원 의 문</div>
  <div class="subtitle">조선으로의 문이 열립니다</div>
  <div class="year" id="yearDisplay">1392</div>
</div>

<div class="bottom-text">🥁 대취타 코스튬 포토부스 체험존 🥁</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

let t = 0;

// 파티클
const particles = Array.from({length: 200}, () => ({
  angle: Math.random() * Math.PI * 2,
  radius: Math.random() * 0.8 + 0.1,
  speed: Math.random() * 0.02 + 0.005,
  size: Math.random() * 3 + 1,
  color: Math.random() < 0.5
    ? `hsl(${260 + Math.random()*40}, 100%, ${60 + Math.random()*30}%)`
    : `hsl(${40 + Math.random()*20}, 100%, ${60 + Math.random()*30}%)`,
  life: Math.random()
}));

function drawWarp() {
  // 배경
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(0, 0, W, H);

  const maxR = Math.min(W, H) * 0.48;

  // 소용돌이 링들
  for (let i = 0; i < 12; i++) {
    const phase = t * (0.3 + i * 0.08) + i * 0.5;
    const r = maxR * (0.15 + i * 0.072) * (0.9 + Math.sin(t * 0.5 + i) * 0.1);
    const hue = 260 + i * 8 + Math.sin(t + i) * 20;
    const alpha = 0.3 + Math.sin(t * 0.7 + i * 0.4) * 0.2;

    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${hue}, 100%, 65%, ${alpha})`;
    ctx.lineWidth = 1.5 + Math.sin(t + i) * 0.8;
    ctx.stroke();
  }

  // 나선 팔
  for (let arm = 0; arm < 3; arm++) {
    const armOffset = (arm / 3) * Math.PI * 2;
    ctx.beginPath();
    for (let s = 0; s < 300; s++) {
      const progress = s / 300;
      const angle = progress * Math.PI * 8 + t * 1.2 + armOffset;
      const r = progress * maxR;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      const hue = 260 + progress * 80 + arm * 40;
      if (s === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `hsla(${260 + arm * 40}, 90%, 65%, 0.25)`;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  // 중앙 포털 글로우
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR * 0.35);
  grad.addColorStop(0, `hsla(280, 100%, 90%, ${0.6 + Math.sin(t) * 0.2})`);
  grad.addColorStop(0.3, `hsla(260, 100%, 60%, ${0.3 + Math.sin(t * 0.7) * 0.1})`);
  grad.addColorStop(0.7, `hsla(240, 100%, 40%, 0.1)`);
  grad.addColorStop(1, 'hsla(240, 100%, 20%, 0)');
  ctx.beginPath();
  ctx.arc(cx, cy, maxR * 0.35, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // 파티클 (별빛)
  particles.forEach(p => {
    p.life += p.speed;
    if (p.life > 1) { p.life = 0; p.angle = Math.random() * Math.PI * 2; }

    const eased = Math.pow(p.life, 0.6);
    const r = eased * maxR * p.radius;
    const swirl = p.angle + eased * Math.PI * 6 + t * 0.5;
    const x = cx + Math.cos(swirl) * r;
    const y = cy + Math.sin(swirl) * r;
    const alpha = Math.sin(p.life * Math.PI);

    ctx.beginPath();
    ctx.arc(x, y, p.size * (1 - eased * 0.5), 0, Math.PI * 2);
    ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('hsl(', 'hsla(');
    ctx.fill();
  });

  // 빛줄기
  for (let i = 0; i < 16; i++) {
    const angle = (i / 16) * Math.PI * 2 + t * 0.3;
    const len = maxR * (0.4 + Math.sin(t * 0.8 + i * 0.4) * 0.15);
    const x1 = cx + Math.cos(angle) * maxR * 0.05;
    const y1 = cy + Math.sin(angle) * maxR * 0.05;
    const x2 = cx + Math.cos(angle) * len;
    const y2 = cy + Math.sin(angle) * len;

    const lineGrad = ctx.createLinearGradient(x1, y1, x2, y2);
    lineGrad.addColorStop(0, `hsla(280, 100%, 80%, 0.4)`);
    lineGrad.addColorStop(1, `hsla(260, 100%, 60%, 0)`);

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 외곽 비네트
  const vignette = ctx.createRadialGradient(cx, cy, maxR * 0.5, cx, cy, Math.max(W, H) * 0.8);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,10,0.85)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  t += 0.018;
}

// 연도 카운트다운 애니메이션
let yearT = 0;
const startYear = 2026;
const endYear = 1392;
function updateYear() {
  yearT += 0.003;
  const progress = (Math.sin(yearT) + 1) / 2;
  const year = Math.round(startYear - (startYear - endYear) * progress);
  document.getElementById('yearDisplay').textContent = year;
}

function loop() {
  drawWarp();
  updateYear();
  requestAnimationFrame(loop);
}
loop();

// ─── Web Audio 워프 효과음 ───────────────────────────────────────
let audioCtx = null;
let audioStarted = false;

function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // 1. 깊은 드론 (우웅~ 베이스)
  function makeDrone(freq, gain, detune = 0) {
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    osc.detune.value = detune;
    gainNode.gain.value = gain;
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    return { osc, gainNode };
  }

  // 2. LFO로 흔들림 효과
  function addLFO(target, rate, depth) {
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = rate;
    lfoGain.gain.value = depth;
    lfo.connect(lfoGain);
    lfoGain.connect(target);
    lfo.start();
  }

  // 3. 리버브 (공간감)
  function makeReverb() {
    const convolver = audioCtx.createConvolver();
    const rate = audioCtx.sampleRate;
    const len = rate * 4;
    const buffer = audioCtx.createBuffer(2, len, rate);
    for (let ch = 0; ch < 2; ch++) {
      const data = buffer.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
      }
    }
    convolver.buffer = buffer;
    return convolver;
  }

  const reverb = makeReverb();
  const masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.7;
  reverb.connect(masterGain);
  masterGain.connect(audioCtx.destination);

  // 드론 레이어들
  const d1 = makeDrone(55, 0.18);       // 깊은 베이스
  const d2 = makeDrone(110, 0.10, 3);   // 옥타브 위 + 약간 디튠
  const d3 = makeDrone(165, 0.06);      // 5도 화음
  const d4 = makeDrone(220, 0.04, -5);  // 높은 음 + 디튠

  // LFO 흔들림
  addLFO(d1.osc.frequency, 0.08, 4);
  addLFO(d2.osc.frequency, 0.13, 3);
  addLFO(d3.gainNode.gain, 0.2, 0.03);

  // 리버브 연결
  [d1, d2, d3, d4].forEach(d => d.gainNode.connect(reverb));

  // 4. 신비로운 하이 톤 (반짝반짝)
  function spawnTone() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const freqs = [440, 528, 660, 880, 1056, 1320];
    osc.frequency.value = freqs[Math.floor(Math.random() * freqs.length)];
    osc.type = 'sine';
    const now = audioCtx.currentTime;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.06, now + 0.3);
    g.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
    osc.connect(g);
    g.connect(reverb);
    osc.start(now);
    osc.stop(now + 2.5);
    setTimeout(spawnTone, 800 + Math.random() * 2000);
  }
  spawnTone();

  // 5. 워프 스윕 (주기적으로 우웅~)
  function warpSweep() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sawtooth';
    const now = audioCtx.currentTime;
    osc.frequency.setValueAtTime(40, now);
    osc.frequency.exponentialRampToValueAtTime(180, now + 3);
    osc.frequency.exponentialRampToValueAtTime(40, now + 6);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.08, now + 1);
    g.gain.linearRampToValueAtTime(0.08, now + 5);
    g.gain.linearRampToValueAtTime(0, now + 6);
    osc.connect(g);
    g.connect(reverb);
    osc.start(now);
    osc.stop(now + 6.5);
    setTimeout(warpSweep, 7000 + Math.random() * 3000);
  }
  warpSweep();
}

// 시작 버튼 오버레이
const startOverlay = document.createElement('div');
startOverlay.style.cssText = `
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,10,0.85);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100; cursor: pointer;
`;
startOverlay.innerHTML = `
  <div style="
    font-family: 'Noto Serif KR', Georgia, serif;
    font-size: clamp(20px, 4vw, 48px);
    color: #d0a0ff;
    letter-spacing: 4px;
    text-shadow: 0 0 30px #7c4dff;
    margin-bottom: 30px;
    text-align: center;
    padding: 0 20px;
  ">차 원 의 문</div>
  <div style="
    padding: 18px 48px;
    background: linear-gradient(135deg, #7c4dff, #e040fb);
    border-radius: 50px;
    font-family: 'Noto Serif KR', Georgia, serif;
    font-size: clamp(16px, 3vw, 24px);
    color: white;
    letter-spacing: 3px;
    box-shadow: 0 0 40px rgba(124,77,255,0.6);
    animation: startPulse 1.5s ease-in-out infinite;
  ">🌀 시작하기</div>
  <style>
    @keyframes startPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(124,77,255,0.6); }
      50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(224,64,251,0.8); }
    }
  </style>
`;
startOverlay.addEventListener('click', () => {
  startAudio();
  startOverlay.style.opacity = '0';
  startOverlay.style.transition = 'opacity 0.8s';
  setTimeout(() => startOverlay.remove(), 800);
});
document.body.appendChild(startOverlay);

// 전체화면 클릭
canvas.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }
});
</script>
</body>
</html>
